[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_pgsql", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.zip", "composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader --no-scripts"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
